<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Detector de Fake News - Integtec</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
}

.container {
    background: #ffffff;
    color: #333;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

h1 {
    text-align: center;
    color: #007bff;
}

textarea {
    width: 100%;
    height: 150px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    resize: none;
}

button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0056b3;
}

.status {
    margin-top: 20px;
    font-weight: bold;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
}

.fake {
    background: #ffcccc;
    color: #cc0000;
}

.true {
    background: #ccffcc;
    color: #006600;
}

.analysis {
    margin-top: 20px;
    background: #f4f4f4;
    padding: 15px;
    border-left: 5px solid #007bff;
    border-radius: 5px;
}
</style>

</head>

<body>

<div class="container">

<h1>🔍 Detector de Fake News</h1>

<p>Digite ou cole uma notícia abaixo para análise:</p>

<textarea id="texto" placeholder="Cole aqui a notícia..."></textarea>

<button onclick="analisar()">Verificar Notícia</button>

<div id="resultado"></div>

</div>

<script>
function analisar() {
    let texto = document.getElementById("texto").value;
    let resultado = document.getElementById("resultado");

    if (texto.trim() === "") {
        resultado.innerHTML = "<p>Digite uma notícia primeiro.</p>";
        return;
    }

    let score = 0;
    let analise = [];

    // Palavras suspeitas
    let palavrasFake = ["URGENTE", "COMPARTILHE", "NÃO MOSTRAM", "SEGREDO", "CHOCANTE"];

    palavrasFake.forEach(p => {
        if (texto.toUpperCase().includes(p)) {
            score += 2;
            analise.push("Uso de linguagem sensacionalista (" + p + ")");
        }
    });

    // Muitas letras maiúsculas
    let maiusculas = texto.match(/[A-Z]/g);
    if (maiusculas && maiusculas.length > texto.length * 0.3) {
        score += 2;
        analise.push("Uso excessivo de letras maiúsculas");
    }

    // Texto muito curto
    if (texto.length < 50) {
        score += 1;
        analise.push("Texto muito curto (pouco detalhado)");
    }

    // Falta de fonte
    if (!texto.toLowerCase().includes("fonte")) {
        score += 2;
        analise.push("Não apresenta fonte confiável");
    }

    // Decisão final
    let status = "";
    let classe = "";

    if (score >= 4) {
        status = "⚠️ PROVÁVEL FAKE NEWS";
        classe = "fake";
    } else {
        status = "✅ NOTÍCIA POSSIVELMENTE CONFIÁVEL";
        classe = "true";
    }

    resultado.innerHTML = `
        <div class="status ${classe}">${status}</div>
        <div class="analysis">
            <strong>Análise:</strong><br>
            ${analise.join("<br>")}
        </div>
    `;
}
</script>

</body>
</html>
